<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <style>
      .wordmark { font-family: 'Arial Black', 'Arial', sans-serif; font-weight: 900; letter-spacing: -0.03em; }
      .sub { font-family: 'Courier New', monospace; letter-spacing: 0.18em; }
    </style>
  </defs>

  <!-- ── ICON MARK: circuit-path S ── -->
  <!-- Top bar -->
  <rect x="4" y="14" width="26" height="5" rx="0" fill="#00e5c8"/>
  <!-- Top-right vertical -->
  <rect x="25" y="14" width="5" height="18" fill="#00e5c8"/>
  <!-- Middle bar -->
  <rect x="4" y="28" width="26" height="5" fill="#00e5c8"/>
  <!-- Bottom-left vertical -->
  <rect x="4" y="32" width="5" height="18" fill="#00e5c8"/>
  <!-- Bottom bar -->
  <rect x="4" y="46" width="26" height="5" fill="#00e5c8"/>

  <!-- Corner dots (nodes) -->
  <circle cx="4" cy="14" r="3.5" fill="#00e5c8"/>
  <circle cx="30" cy="14" r="3.5" fill="#00e5c8"/>
  <circle cx="30" cy="32" r="3.5" fill="#00e5c8"/>
  <circle cx="4" cy="32" r="3.5" fill="#00e5c8"/>
  <circle cx="4" cy="51" r="3.5" fill="#00e5c8"/>
  <circle cx="30" cy="51" r="3.5" fill="#00e5c8"/>

  <!-- ── WORDMARK ── -->
  <!-- SOSATECH -->
  <text x="48" y="42" class="wordmark" font-size="28" fill="#f0f4f8">SOSA<tspan fill="#00e5c8">TECH</tspan></text>

  <!-- SOLUTIONS -->
  <text x="49" y="57" class="sub" font-size="8.5" fill="#5a6a7a">SOLUTIONS</text>

  <!-- Vertical divider between icon and wordmark -->
  <line x1="42" y1="14" x2="42" y2="60" stroke="#1e2731" stroke-width="1"/>
</svg>
